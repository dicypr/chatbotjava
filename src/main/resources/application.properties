# ── Server ───────────────────────────────────────────
server.port=8080

# ── Groq API Key ─────────────────────────────────────
# Option 1: Set directly here (NOT for production - commit risk)
# groq.api.key=gsk_your_key_here

# Option 2: Use env var (recommended for production)
# Run: export GROQ_API_KEY=gsk_your_key_here
groq.api.key=${GROQ_API_KEY:your_key_here}

# ── Spring settings ───────────────────────────────────
spring.application.name=groq-chatbot
spring.web.resources.static-locations=classpath:/static/

# ── Logging ───────────────────────────────────────────
logging.level.com.groqbot=INFO
logging.level.org.springframework.web=WARN
